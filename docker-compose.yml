services:
  db:
    image: postgres:16-alpine
    container_name: product_store_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-mobupps_db}
    # Postgres is intentionally private to the Compose network. The backend
    # reaches it through `db:5432`; publishing it would expose the database.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mobupps_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: product_store_backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/${POSTGRES_DB:-mobupps_db}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-super-secret-access-token-key-change-in-prod-12345}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    # Internal-only: reachable by the frontend (Nginx) over the Docker network
    # as `http://backend:4000`, but NOT published to the host/internet.
    # All external traffic flows through the frontend container's Nginx proxy.
    expose:
      - "4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: product_store_frontend
    restart: always
    # Coolify's proxy publishes the configured domain. Keep Nginx internal so
    # the Compose stack does not collide with the host's own port 80 listener.
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
